<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Dias para Aniversário</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container" id="caixa">
        <h1>Quantos dias faltam para o seu aniversário?</h1>
        <label for="dataAniversario">Digite a data do seu aniversário (DD/MM):</label>
        <input type="text" id="dataAniversario" placeholder="Ex: 25/12">
        <button onclick="calcularDias()">Calcular</button>
        <p id="resultado"></p>
    </div>

   
</body>
</html>
